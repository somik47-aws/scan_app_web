# Firebase App Hosting — https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://scan.tinyhands.co.in
    availability:
      - BUILD
      - RUNTIME

# Include baked env file in server deployment (created during npm run build)
outputFiles:
  serverApp:
    include:
      - env.baked.json
      - .next
